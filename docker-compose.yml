services:
  postgres:
    image: postgres:15-alpine
    container_name: nexusai_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexusai}
      POSTGRES_USER: ${POSTGRES_USER:-nexusai_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexusai_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexusai_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: nexusai_chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
       test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8000'"]
       interval: 10s
       timeout: 5s
       retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexusai_backend
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - CHROMA_HOST=chromadb
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexusai_frontend
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000

volumes:
  postgres_data:
  chroma_data:
  uploads_data: